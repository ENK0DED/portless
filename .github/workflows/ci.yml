name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install --frozen-lockfile

      - run: |
          git remote get-url upstream >/dev/null 2>&1 || git remote add upstream https://github.com/vercel-labs/portless.git
          git fetch upstream main:refs/remotes/upstream/main

      - run: bun run test:fork-ledger

      - run: bun run check:fork-ledger

      - run: bun run format:check

      - run: bun run lint

      - run: bun run type-check

      - run: bun run build

      - run: bun run test

      - run: bun run test:e2e

  ci-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install --frozen-lockfile

      - run: bun run type-check

      - run: bun run build

      - run: bun run test
